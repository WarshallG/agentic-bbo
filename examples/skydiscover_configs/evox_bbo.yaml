# Example SkyDiscover config for BBO interleaved runs with search.type = evox.
# EvoX uses EvoxDatabaseConfig; optional top-level search.switch_interval / search.share_llm apply.
#
# Usage:
#   python examples/run_skydiscover_interleaved_openai_demo.py --preset evox

max_iterations: 50
checkpoint_interval: 10
log_level: "INFO"
log_llm_raw_outputs: true

llm:
  models:
    - name: "gpt-4o-mini"
      weight: 1.0
  temperature: 0.7
  max_tokens: 8192
  timeout: 120

search:
  type: "evox"
  num_context_programs: 4
  switch_interval: 8
  share_llm: false
  database:
    auto_generate_variation_operators: true

prompt:
  # Loaded from sibling file (full seed reference + IO contract); keep path relative to this YAML.
  system_message: bbo_interleaved_system_prompt.txt

evaluator:
  timeout: 120
  max_retries: 2
  cascade_evaluation: false

diff_based_generation: false
max_solution_length: 60000
