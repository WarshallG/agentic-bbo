# Example SkyDiscover config for BBO interleaved runs with search.type = adaevolve.
# Tune hyperparameters under search.database (see AdaEvolveDatabaseConfig in skydiscover/config.py).
#
# Usage:
#   python examples/run_skydiscover_interleaved_openai_demo.py --preset adaevolve
# Ensure search.type here matches --search-type (apply_overrides replaces the database if types mismatch).

max_iterations: 50
checkpoint_interval: 10
log_level: "INFO"
log_llm_raw_outputs: true

llm:
  models:
    - name: "gpt-4o-mini"
      weight: 1.0
  temperature: 0.7
  max_tokens: 8192
  timeout: 120

search:
  type: "adaevolve"
  num_context_programs: 4
  database:
    population_size: 12
    num_islands: 2
    decay: 0.9
    intensity_min: 0.15
    intensity_max: 0.5
    use_adaptive_search: true
    use_ucb_selection: true
    use_migration: true
    migration_interval: 10
    migration_count: 3
    use_dynamic_islands: false
    max_islands: 3
    use_paradigm_breakthrough: false

prompt:
  # Loaded from sibling file (full seed reference + IO contract); keep path relative to this YAML.
  system_message: bbo_interleaved_system_prompt.txt

evaluator:
  timeout: 120
  max_retries: 2
  cascade_evaluation: false

diff_based_generation: false
max_solution_length: 60000
