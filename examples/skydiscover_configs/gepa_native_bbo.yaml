# Example SkyDiscover config for BBO interleaved runs with search.type = gepa_native.
# Tune GEPA-specific knobs under search.database (GEPANativeDatabaseConfig in skydiscover/config.py).
#
# Usage:
#   python examples/run_skydiscover_interleaved_openai_demo.py --preset gepa_native
# Full GEPA stack may require: uv sync --extra skydiscover and skydiscover optional extras.

max_iterations: 50
checkpoint_interval: 10
log_level: "INFO"
log_llm_raw_outputs: true

llm:
  models:
    - name: "gpt-4o-mini"
      weight: 1.0
  temperature: 0.7
  max_tokens: 8192
  timeout: 120

search:
  type: "gepa_native"
  num_context_programs: 4
  database:
    population_size: 24
    candidate_selection_strategy: "epsilon_greedy"
    epsilon: 0.15
    acceptance_gating: true
    use_merge: true
    merge_after_stagnation: 12
    max_merge_attempts: 6
    max_recent_failures: 4

prompt:
  # Loaded from sibling file (full seed reference + IO contract); keep path relative to this YAML.
  system_message: bbo_interleaved_system_prompt.txt

evaluator:
  timeout: 120
  max_retries: 2
  cascade_evaluation: false

diff_based_generation: false
max_solution_length: 60000
