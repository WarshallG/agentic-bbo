# OpenEvolve external backend for BBO interleaved runs.
# This uses SkyDiscover search.type "openevolve" and may require the upstream openevolve package.
#
# Single-objective note (see README / SkyDiscover docs):
#   OpenEvolve Native compares programs with _is_better = higher fitness wins.
#   Fitness is primarily metrics["combined_score"], else the mean of numeric metrics
#   (excluding MAP-Elites feature_dimensions keys). So for one metric you want to
#   MINIMIZE (e.g. loss), return combined_score = -loss (or another strictly
#   monotone transform so "better" = larger combined_score).
#
# Usage:
#   python examples/run_skydiscover_interleaved_openai_demo.py --preset openevolve

max_iterations: 50
checkpoint_interval: 10
log_level: "INFO"
# Log each LLM completion to <output_dir>/logs/llm_raw/ and an INFO line in the main .log
log_llm_raw_outputs: true

llm:
  models:
    - name: "gpt-4o-mini"
      weight: 1.0
  temperature: 0.7
  max_tokens: 8192
  timeout: 120

search:
  type: "openevolve"
  num_inspirations: 5
  database:
    num_islands: 3
    population_size: 20
    archive_size: 60
    exploration_ratio: 0.2
    exploitation_ratio: 0.7
    elite_selection_ratio: 0.1
    feature_dimensions: ["complexity", "diversity"]
    feature_bins: 8
    diversity_reference_size: 12
    migration_interval: 8
    migration_rate: 0.1
    random_seed: 42

prompt:
  # Loaded from sibling file (full seed reference + IO contract); keep path relative to this YAML.
  system_message: bbo_interleaved_system_prompt.txt

evaluator:
  timeout: 120
  max_retries: 2
  cascade_evaluation: false

# Full-file rewrite avoids SEARCH/REPLACE merge corruption (recommended for suggest_next_config).
diff_based_generation: false
max_solution_length: 60000
